name: GLD LEAP Agent

on:
  # Run every 15 minutes — the time-check step below filters to
  # Mon–Fri 8:30am–3:00pm CST (14:30–21:00 UTC) only.
  schedule:
    - cron: "*/15 * * * *"

  # Manual trigger for testing from the GitHub UI
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Check trading hours (Mon–Fri 14:30–21:00 UTC)
        id: time_check
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          DOW=$(date -u +%u)        # 1=Mon … 7=Sun
          TOTAL_MIN=$((HOUR * 60 + MINUTE))

          echo "UTC time: ${HOUR}:${MINUTE} (day $DOW, total_min=$TOTAL_MIN)"

          # Mon=1 .. Fri=5 only
          if [ "$DOW" -gt 5 ]; then
            echo "Weekend — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 14:30 UTC = 870 min, 21:00 UTC = 1260 min
          if [ "$TOTAL_MIN" -lt 870 ] || [ "$TOTAL_MIN" -ge 1260 ]; then
            echo "Outside trading window — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Within trading hours ✅"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.time_check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        if: steps.time_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.time_check.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GLD LEAP Agent
        if: steps.time_check.outputs.skip != 'true'
        run: |
          python -c "
          from agent import run_gld_analysis
          from telegram_sender import send_to_telegram

          analysis = run_gld_analysis()
          send_to_telegram(analysis)
          print('Done.')
          "
