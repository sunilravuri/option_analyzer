name: GLD LEAP Agent

on:
  # Triggered externally via cron-job.org → GitHub API dispatch (more reliable than GitHub's native cron)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Check trading hours (Mon–Fri only)
        id: time_check
        run: |
          DOW=$(date -u +%u)   # 1=Mon … 7=Sun
          echo "UTC time: $(date -u +'%H:%M') (day $DOW)"

          if [ "$DOW" -gt 5 ]; then
            echo "Weekend — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Within trading hours ✅"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.time_check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        if: steps.time_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.time_check.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GLD LEAP Agent
        if: steps.time_check.outputs.skip != 'true'
        run: |
          python -c "
          from agent import run_gld_analysis
          from telegram_sender import send_to_telegram

          analysis = run_gld_analysis()
          send_to_telegram(analysis)
          print('Done.')
          "
