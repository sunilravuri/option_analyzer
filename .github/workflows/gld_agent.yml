name: GLD LEAP Agent

on:
  # Triggered externally via cron-job.org → GitHub API dispatch
  # Set up two jobs on cron-job.org:
  #   Full run:     POST run_type=full     at 8:30 AM CST (14:30 UTC), Mon–Fri
  #   Intraday run: POST run_type=intraday at 9:30–2:00 PM CST (15:30–20:00 UTC), Mon–Fri
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Run type: full or intraday'
        required: true
        default: 'full'

permissions:
  contents: read

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GLD LEAP Agent
        run: python agent.py ${{ github.event.inputs.run_type }}
